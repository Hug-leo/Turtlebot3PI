amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: /scan
    set_initial_pose: true
    always_reset_initial_pose: false
    save_pose_rate: 0.5
    transform_tolerance: 2.0
    min_particles: 500 # <--- THÊM VÀO
    max_particles: 2000 # <--- THÊM VÀO
    update_min_d: 0.05
    update_min_a: 0.1
    resample_interval: 1

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odometry/filtered
    transform_tolerance: 0.5

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0 # RPP chạy tốt nhất ở 10Hz, Pi 4 dư sức xử lý
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.0001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.05
      movement_time_allowance: 60.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # ĐỘ CHÍNH XÁC CAO: 5cm để quét mã QR chuẩn xác
      xy_goal_tolerance: 0.08
      yaw_goal_tolerance: 0.06

    # ==============================================================
    # THUẬT TOÁN RPP (Regulated Pure Pursuit) - CHUYÊN DỤNG CHO KHO
    # ==============================================================
    # FollowPath:
    #   plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
    #   desired_linear_vel: 0.15
    #   lookahead_dist: 0.4   # Khoảng cách nhìn trước để bám đường
    #   min_lookahead_dist: 0.2
    #   max_lookahead_dist: 0.8
    #   lookahead_time: 1.5
    #   rotate_to_heading_angular_vel: 0.5
    #   transform_tolerance: 0.5
    #   use_velocity_scaled_lookahead_dist: true
    #   min_approach_linear_velocity: 0.05
    #   approach_velocity_scaling_dist: 0.5

    #   use_collision_detection: true
    #   max_allowed_time_to_collision_up_to_lookahead_dist: 1.0

    #   use_regulated_linear_velocity_scaling: true
    #   regulated_linear_scaling_min_radius: 0.6
    #   regulated_linear_scaling_min_speed: 0.05

    #   use_rotate_to_heading: true
    #   allow_reversing: false
    #   rotate_to_heading_min_angle: 0.15  # <--- SỬA XUỐNG 0.35 (khoảng 20 độ)
    #   rotate_to_heading_angular_vel: 0.6 # Giữ nguyên, tốc độ xoay khi vào trạm
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.15

      lookahead_dist: 0.4
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.8
      lookahead_time: 1.5

      transform_tolerance: 0.5
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.5

      use_collision_detection: true
      max_allowed_time_to_collision_up_to_lookahead_dist: 1.0

      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.6
      regulated_linear_scaling_min_speed: 0.05

      use_rotate_to_heading: true
      allow_reversing: false
      rotate_to_heading_min_angle: 0.30 #0.08 , 0.35
      # Tốc độ bẻ lái khi vào trạm đỗ
      rotate_to_heading_angular_vel: 0.35

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true # A* giúp tìm đường tối ưu hơn trong kho
      allow_unknown: true

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.22, 0.0, 0.8]
    min_velocity: [-0.22, 0.0, -0.8]

    # [ĐÃ SỬA]: Giảm mạnh gia tốc để bộ PID của STM32 kịp đáp ứng
    max_accel: [0.15, 0.0, 0.35] # Sửa 0.5 thành 0.35
    max_decel: [-0.15, 0.0, -0.35] # Sửa -0.5 thành -0.35
    # max_accel: [0.15, 0.0, 0.5]
    # max_decel: [-0.15, 0.0, -0.5]
    # max_accel: [2.0, 0.0, 2.5]
    # max_decel: [-2.0, 0.0, -2.5]

    odom_topic: "/odometry/filtered"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.22
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.35 # Vùng đệm an toàn rộng hơn

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0 #3.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.22
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          obstacle_max_range: 2.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.30

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl
      - planner_server
      - controller_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
