slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Frames
    map_frame: map
    odom_frame: odom
    base_frame: base_link
    scan_topic: /scan

    mode: mapping

    resolution: 0.05

    # In this slam_toolbox build, map publication is controlled by map_update_interval.
    map_update_interval: 1.0
    minimum_time_interval: 0.5
    transform_publish_period: 0.05

    # Reduce scan backlog and make TF lookup more tolerant on Raspberry Pi.
    throttle_scans: 2
    scan_queue_size: 50
    tf_buffer_duration: 30.0
    transform_timeout: 0.5

    use_scan_matching: true
